<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GatherGo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--primary);"></i>
            <span>Gather</span>Go
        </a>
    </nav>

    <!-- Auth Wrapper -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Log in to manage your tickets and events</p>
            </div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email" class="form-label">Email Address</label>
                    <input type="email" id="login-email" class="form-input" placeholder="rahul@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password" class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="login-role" class="form-label">Role</label>
                    <select id="login-role" class="form-select">
                        <option value="user">Attendee / User</option>
                        <option value="organizer">Event Organizer</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const role = document.getElementById('login-role').value;
            
            try {
                // Special admin validation
                if (role === 'admin' && email === 'admin@gmail.com' && password === 'admin123') {
                    const adminUser = {
                        user_id: 999,
                        full_name: "Admin System",
                        email: "admin@gmail.com",
                        role: "admin"
                    };
                    setCurrentUser(adminUser);
                    showNotification('Welcome, Administrator!');
                    setTimeout(() => { window.location.href = 'admin_dashboard.html'; }, 1000);
                    return;
                }
                
                // For organizers/users, fetch standard users from backend
                const users = await apiFetch('/users/');
                
                // Find matching user credentials
                const matchedUser = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
                
                if (matchedUser) {
                    matchedUser.role = role; // Set selected session role
                    setCurrentUser(matchedUser);
                    showNotification(`Welcome back, ${matchedUser.full_name}!`);
                    
                    setTimeout(() => {
                        if (role === 'organizer') {
                            window.location.href = 'organizer_dashboard.html';
                        } else {
                            window.location.href = 'user_dashboard.html';
                        }
                    }, 1000);
                } else {
                    showNotification('Invalid email or password.');
                }
            } catch (err) {
                console.error("Login Error:", err);
            }
        }

        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            if (getCurrentUser()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
